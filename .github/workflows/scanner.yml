name: market-scanner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Stiahnut kod
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Nainstalovat kniznice
        run: pip install yfinance requests pandas matplotlib

      - name: Obnovit stav
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-

      - name: Spustit skener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          RUN_ONCE: "1"
        run: python market_scanner.py

      - name: Ulozit stav
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: scanner-state-${{ github.run_id }}
